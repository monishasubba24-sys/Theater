 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Theater Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        /* RESET */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: #141414;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        header,
        footer {
            background-color: #111;
            padding: 1.2rem 2rem;
            text-align: center;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #e50914;
            user-select: none;
        }

        .nav-container {
            position: relative;
        }

        .hamburger {
            display: none;
            font-size: 2rem;
            cursor: pointer;
            color: #fff;
            padding: 0.8rem 1rem;
            position: absolute;
            right: 0.5rem;
            top: 0.2rem;
            z-index: 1001;
        }

        nav {
            background-color: #1b1b1b;
            display: flex;
            justify-content: center;
            padding: 0.8rem 1rem;
            gap: 2rem;
            font-size: 1rem;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 999;
            transition: all 0.3s ease;
        }

        nav a {
            color: #eee;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            transition: background 0.3s ease, color 0.3s ease;
            border-radius: 4px;
        }

        nav a:hover {
            background: #e50914;
            color: #fff;
        }

        nav a.active {
            background: #e50914cc;
            box-shadow: 0 0 20px #e50914dd;
            pointer-events: none;
        }

        nav a:focus-visible {
            outline: 2px solid #e50914;
            outline-offset: 3px;
        }

        footer {
            font-weight: 400;
            font-size: 1rem;
            color: #999;
            letter-spacing: normal;
        }

        footer a {
            color: #e50914;
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.3rem;
        }

        footer a:hover {
            text-decoration: underline;
        }

        #filter-bar {
            background: #222;
            padding: 1rem 2rem;
            text-align: center;
        }

        #filter-bar label {
            font-weight: 600;
            margin-right: 0.6rem;
            font-size: 1.1rem;
            color: #ddd;
            user-select: none;
        }

        #filter-bar input[type="date"] {
            padding: 0.5rem 0.8rem;
            font-size: 1rem;
            border-radius: 6px;
            border: none;
            outline: none;
            background: #333;
            color: #eee;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #filter-bar input[type="date"]:hover,
        #filter-bar input[type="date"]:focus {
            background: #444;
        }

        .theater-list {
            max-width: 1200px;
            margin: 2rem auto 4rem;
            padding: 0 1rem;
        }

        .theater {
            margin-bottom: 3rem;
            user-select: none;
        }

        .theater h2 {
            font-weight: 700;
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            color: #e50914;
            letter-spacing: 1.2px;
        }

        .movie-row {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
            scrollbar-color: #e50914 #222;
        }

        .movie-row::-webkit-scrollbar {
            height: 8px;
        }

        .movie-row::-webkit-scrollbar-track {
            background: #222;
        }

        .movie-row::-webkit-scrollbar-thumb {
            background-color: #e50914;
            border-radius: 20px;
        }

        .movie {
            background-color: #222;
            min-width: 180px;
            max-width: 180px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgb(229 9 20 / 0.6);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            user-select: none;
            position: relative;
        }

        .movie:hover {
            transform: scale(1.12);
            box-shadow: 0 0 20px #e50914;
            z-index: 10;
        }

        .movie img {
            width: 100%;
            height: 270px;
            object-fit: cover;
            display: block;
        }

        .movie-details {
            padding: 0.7rem 0.8rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .movie-title {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .movie-date {
            font-size: 0.85rem;
            color: #aaa;
            letter-spacing: 0.6px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            max-width: 700px;
            width: 90%;
            background: #222;
            border-radius: 12px;
            padding: 1.8rem 2rem 2.5rem;
            box-shadow: 0 0 25px #e50914;
            transform: translate(-50%, -50%) scale(0.7);
            opacity: 0;
            z-index: 1100;
            color: #eee;
            transition: opacity 0.3s ease, transform 0.3s ease;
            overflow-y: auto;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            user-select: text;
        }

        .popup.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .popup h3 {
            margin: 0 0 0.7rem;
            font-size: 1.8rem;
            font-weight: 700;
            color: #e50914;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .popup p {
            font-size: 1rem;
            line-height: 1.4;
            color: #ddd;
            flex-grow: 1;
        }

        iframe {
            margin-top: 1rem;
            border: none;
            border-radius: 10px;
            height: 320px;
            width: 100%;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.8);
        }

        .popup-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .book-btn,
        .close-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .book-btn {
            background-color: #28a745;
            color: white;
        }

        .close-btn {
            background-color: #dc3545;
            color: white;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                display: none;
                position: absolute;
                top: 55px;
                left: 0;
                width: 100%;
                background: #1b1b1b;
                z-index: 1000;
                padding: 1rem 0;
                gap: 1rem;
            }

            nav.active {
                display: flex;
            }

            .hamburger {
                display: block;
            }

            .movie {
                min-width: 140px;
                max-width: 140px;
            }

            .movie img {
                height: 210px;
            }

            iframe {
                height: 220px;
            }
        }

        @media (max-width: 480px) {
            .movie-row {
                gap: 0.6rem;
            }

            .movie {
                min-width: 120px;
                max-width: 120px;
            }

            .movie img {
                height: 180px;
            }

            iframe {
                height: 180px;
            }
        }
    </style>
</head>

<body>
    <header>
        LOCAL THEATER MOVIE SCHEDULES
    </header>

    <div class="nav-container">
        <div class="hamburger" id="hamburger">☰</div>
        <nav id="main-nav">
            <a href="index.html" class="active">Home</a>
            <a href="contact.html">Contact</a>
            <a href="book.html">Book Tickets</a>
        </nav>
    </div>

    <section id="filter-bar">
        <label for="filter-date">Filter by date:</label>
        <input type="date" id="filter-date" onchange="filterMovies()" />
    </section>

    <section class="theater-list" id="theater-list"></section>

    <div class="overlay" id="overlay" onclick="hidePopup()"></div>

    <div class="popup" id="popup">
        <h3 id="popup-title">Movie Title</h3>
        <p id="popup-description">Movie description and details here...</p>
        <iframe id="popup-trailer" src="" allowfullscreen></iframe>
        <div class="popup-actions">
            <a class="book-btn" href="book.html" style="text-decoration: none;">Book Now</a>
            <button class="close-btn" onclick="hidePopup()">Close</button>
        </div>
    </div>

    <footer>
        &copy; 2025 Local Theater. All rights reserved
    </footer>

        function renderMovies() {
            const container = document.getElementById("theater-list");
            container.innerHTML = "";

            theaters.forEach(theater => {
                const theaterDiv = document.createElement("div");
                theaterDiv.className = "theater";

                const h2 = document.createElement("h2");
                h2.textContent = theater.name.toUpperCase();
                theaterDiv.appendChild(h2);

                const movieRow = document.createElement("div");
                movieRow.className = "movie-row";

                theater.movies.forEach(movie => {
                    const movieDiv = document.createElement("div");
                    movieDiv.className = "movie";
                    movieDiv.setAttribute("data-date", movie.date);
                    movieDiv.onclick = () => showPopup(movie.title, movie.trailer);

                    movieDiv.innerHTML = `
            <img src="${movie.img}" alt="${movie.title}" loading="lazy" />
            <div class="movie-details">
              <div class="movie-title">${movie.title}</div>
              <div class="movie-date">${formatDate(movie.date)}</div>
            </div>
          `;
                    movieRow.appendChild(movieDiv);
                });

                theaterDiv.appendChild(movieRow);
                container.appendChild(theaterDiv);
            });
        }

        function filterMovies() {
            const filterDate = document.getElementById("filter-date").value;
            const movieCards = document.querySelectorAll(".movie");

            movieCards.forEach(card => {
                const movieDate = card.getAttribute("data-date");
                if (!filterDate || movieDate === filterDate) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-GB', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }

        function showPopup(title, trailerUrl) {
            const popup = document.getElementById("popup");
            const overlay = document.getElementById("overlay");
            const normalizedTitle = title.toLowerCase().trim();
            const description = movieDetails[normalizedTitle] || "No additional info available.";

            document.getElementById("popup-title").innerText = title;
            document.getElementById("popup-description").innerHTML = description;
            document.getElementById("popup-trailer").src = trailerUrl + "?autoplay=1&rel=0";

            popup.classList.add("active");
            overlay.classList.add("active");
        }

        function hidePopup() {
            const popup = document.getElementById("popup");
            const overlay = document.getElementById("overlay");
            const trailer = document.getElementById("popup-trailer");

            popup.classList.remove("active");
            overlay.classList.remove("active");
            trailer.src = ""; // stop video
        }

        // Hamburger Menu Toggle
        document.getElementById("hamburger").addEventListener("click", () => {
            document.getElementById("main-nav").classList.toggle("active");
        });

        // Initial render
        renderMovies();
    </script>
