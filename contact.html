<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us - Local Theater</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #141414;
      color: #fff;
    }
    header {
      background-color: #111;
      padding: 2rem 1rem;
      text-align: center;
      font-size: 2.5rem;
      font-weight: 900;
      color: #e50914;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #e50914aa;
      user-select: none;
      box-shadow: 0 3px 10px #e5091470;
      transition: transform 0.3s ease;
    }
    header:hover {
      transform: scale(1.05);
    }

    nav {
      background-color: #1b1b1b;
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      padding: 1.2rem 0;
      box-shadow: inset 0 -2px 6px #e5091422;
      user-select: none;
    }
    nav a {
      color: #eee;
      text-decoration: none;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 1.1rem;
      transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
      box-shadow: 0 0 6px transparent;
      display: inline-block;
      outline-offset: 3px;
    }
    nav a:hover,
    nav a:focus {
      background: #e50914;
      color: #fff;
      box-shadow: 0 0 15px #e50914aa;
      transform: translateY(-3px);
      outline: none;
    }
    nav a.active {
      background: #e50914cc;
      box-shadow: 0 0 20px #e50914dd;
      pointer-events: none;
    }
    nav a:focus-visible {
      outline: 2px solid #e50914;
      outline-offset: 3px;
    }

     .hamburger {
      display: none;
      font-size: 2rem;
      cursor: pointer;
      color: #fff;
      padding: 0.8rem 1rem;
      position: absolute;
      right: 0.5rem;
      top: 0.2rem;
      z-index: 1001;
    }

    .nav-container {
      position: relative;
    }
    main {
      max-width: 500px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h2 {
      color: #e50914;
      font-size: 1.8rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    form {
      background: #222;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(229, 9, 20, 0.7);
    }
    label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1.2rem;
      border-radius: 4px;
      border: none;
      font-size: 1rem;
      font-family: 'Montserrat', sans-serif;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    button {
      background-color: #e50914;
      border: none;
      padding: 0.8rem 1.5rem;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #b0070f;
    }
    footer {
      background-color: #111;
      color: #999;
      text-align: center;
      padding: 1rem;
      margin-top: 3rem;
      font-size: 1rem;
    }
    footer a {
      color: #e50914;
      text-decoration: none;
      font-weight: bold;
    }
    footer a:hover {
      text-decoration: underline;
    }
  @media (max-width: 768px) {
      nav {
        flex-direction: column;
        display: none;
        position: absolute;
        top: 55px;
        left: 0;
        width: 100%;
        background: #1b1b1b;
        z-index: 1000;
        padding: 1rem 0;
        gap: 1rem;
      }

      nav.active {
        display: flex;
      }

      .hamburger {
        display: block;
      }

    
      }
  </style>
</head>
<body>

<header>Contact Local Theater</header>

<div class="nav-container">
    <div class="hamburger" id="hamburger">☰</div>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="contact.html"  class="active">Contact</a>
      <a href="book.html">Book Tickets</a>
    </nav>
  </div>

<main>
  <h2>Get in Touch</h2>
  <form action="#" method="POST" onsubmit="return validateForm()">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required />

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required />

    <label for="message">Message</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Send Message</button>
  </form>
</main>

<footer>
  &copy; 2025 Local Theater. All rights reserved. | <a href="index.html">Home</a>
</footer>

<script>

       document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('main-nav').classList.toggle('active');
    });

    document.querySelectorAll('#main-nav a').forEach(link => {
      link.addEventListener('click', () => {
        document.getElementById('main-nav').classList.remove('active');
      });
    });
  function validateForm() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();

    if (!name || !email || !message) {
      alert('Please fill out all fields.');
      return false;
    }

    // Simple email validation
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
      alert('Please enter a valid email address.');
      return false;
    }

    alert('Thank you for contacting us!');
    return true;

    
  }
</script>

</body>
</html>
